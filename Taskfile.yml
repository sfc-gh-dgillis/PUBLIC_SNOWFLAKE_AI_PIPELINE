#          FILE_UPLOAD_DIR: $FILE_UPLOAD_DIR
#          CLI_CONNECTION_NAME: $CLI_CONNECTION_NAME
#          INTERNAL_NAMED_STAGE: $INTERNAL_NAMED_STAGE

