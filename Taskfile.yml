#        vars:
#          SQL_SORT_PROCESS_DIR: sql/batch-2
#          CLI_CONNECTION_NAME: $CLI_CONNECTION_NAME

      - task: snow-cli:generate-notebook
        vars:
          TEMPLATE_FILE: notebook/template/2_AI_Pipeline/2_AI_Pipeline_template.ipynb
          OUTPUT_FILE: notebook/output/2_AI_Pipeline/2_AI_Pipeline.ipynb
      - task: snow-cli:deploy-notebook
        vars:
          PROJECT_DIR: notebook/output/2_AI_Pipeline


  demo-down:
    desc: |
      Usage: `task demo-down` will teardown the demo. In this case, dropping the database which is created as part of the demo.

    cmds:
      - task: snow-cli:drop-database-if-exists
        vars:
          CLI_CONNECTION_NAME: $CLI_CONNECTION_NAME
          DATABASE_NAME: $DATABASE_NAME
